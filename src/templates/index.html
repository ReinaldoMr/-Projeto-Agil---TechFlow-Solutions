<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciamento de Tarefas</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container{
            max-width: 800px;
            margin: auto;
        }

        h1{
            text-align: center;
            color: #2c3e50;
        }

        .formulario{
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        input, textarea{
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button{
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-right: 5px;
        }

        .btn-cadastrar{
            background-color: #3498db;
            color: white;
        }

        .btn-editar{
            background-color: #f39c12;
            color: white;
        }

        .btn-concluir{
            background-color: #27ae60;
            color: white;
        }

        .btn-excluir{
            background-color: #e74c3c;
            color: white;
        }

        .card{
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 8px rgba(0,0,0,0.1);
        }

        .status{
            font-weight: bold;
            color: #2c3e50;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Sistema de Gerenciamento de Tarefas</h1>

    <div class="formulario">
        <h2>Nova Tarefa</h2>

        <form method="POST" action="/adicionar">
            <input type="text" name="titulo" placeholder="Título da tarefa" required>

            <textarea name="descricao" placeholder="Descrição da tarefa"></textarea>

            <button class="btn-cadastrar" type="submit">
                Cadastrar
            </button>
        </form>
    </div>

    <h2>Lista de Tarefas</h2>

    {% for tarefa in tarefas %}
        <div class="card">

            <h3>{{ tarefa.titulo }}</h3>

            <p>{{ tarefa.descricao }}</p>

            <p class="status">
                Status: {{ tarefa.status }}
            </p>

            <a href="/editar/{{ tarefa.id }}">
                <button class="btn-editar">Editar</button>
            </a>

            <a href="/concluir/{{ tarefa.id }}">
                <button class="btn-concluir">Concluir</button>
            </a>

            <a href="/excluir/{{ tarefa.id }}">
                <button class="btn-excluir">Excluir</button>
            </a>

        </div>
    {% endfor %}

</div>

</body>
</html>
