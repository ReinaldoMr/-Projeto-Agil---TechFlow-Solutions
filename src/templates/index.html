<!DOCTYPE html>
<html>
<head>
    <title>Gerenciamento de Tarefas</title>
</head>
<body>

    <h1>Sistema de Gerenciamento de Tarefas</h1>

    <h2>Nova Tarefa</h2>

    <form method="POST" action="/adicionar">
        <input type="text" name="titulo" placeholder="Título da tarefa" required>
        <br><br>

        <textarea name="descricao" placeholder="Descrição da tarefa"></textarea>
        <br><br>

        <button type="submit">Cadastrar</button>
    </form>

    <h2>Lista de Tarefas</h2>

    {% for tarefa in tarefas %}
        <div>
            <h3>{{ tarefa.titulo }}</h3>
            <p>{{ tarefa.descricao }}</p>

            <a href="/editar/{{ tarefa.id }}">
                <button>Editar</button>
            </a>

            <a href="/excluir/{{ tarefa.id }}">
                <button>Excluir</button>
            </a>

            <hr>
        </div>
    {% endfor %}

</body>
</html>
